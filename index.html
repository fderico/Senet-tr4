<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ȿⲉⲛⲉⲧ</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&family=IM+Fell+English&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stile.css">
</head>

<body>

<!-- Struttura pagina -->
<div class="intestazione">
  <h1>Ȿⲉⲛⲉⲧ</h1>
</div>

<div class="geroglifici">𓂀 𓆣 𓇯 𓂋 𓆣 𓂀</div>

<div id="menu">
  <h2>Seleziona la tua via</h2>
  <div class="bottoni-menu">
    <button onclick="scegliVsComputer()">🫵🏻 VS 🤖</button>
    <button onclick="scegliVsUmano()">🫵🏻 VS 👤</button>
  </div>
</div>

<div id="sottomenu"></div>

<div id="wrapper">
  <div class="barra-controlli barraG1" style="display: none;">
    <button onclick="giocaTurno(1)">Lancia dado</button>
    <div id="dado1" class="dado"></div>
    <button onclick="confermaMossa(1)">Conferma</button>
  </div>

  <div id="board"></div>

  <div class="barra-controlli barraG2" style="display: none;">
    <button onclick="giocaTurno(2)">Lancia dado</button>
    <div id="dado2" class="dado"></div>
    <button onclick="confermaMossa(2)">Conferma</button>
  </div>
</div>

<!-- Barra tasti casa/riavvia -->
<div id="barra-partita">
  <button id="btn-casa" title="Menu principale" onclick="tornaAlMenu()">🏠</button>
  <button id="btn-riavvia" title="Riavvia partita" onclick="riavviaPartita()">🔄</button>
</div>

<!-- Overlay vittoria -->
<div id="vittoria-overlay">
  <div id="vittoria-panel">
    <div id="vittoria-header">
      <div id="vittoria-titolo">🏆 Vittoria!</div>
      <div id="vittoria-sottotitolo" style="margin-top:6px;"></div>
    </div>
    <div id="vittoria-body">
      <div id="vittoria-messaggio-attesa"></div>
      <div class="vittoria-btn-row">
        <button id="btn-rivincita" onclick="cliccaRivincita()">⚔️ Rivincita</button>
        <button id="btn-vittoria-menu" onclick="tornaAlMenu()">🏠 Menu</button>
      </div>
    </div>
  </div>
</div>

<!-- Overlay conferma azione (casa / riavvia) -->
<div id="conferma-overlay">
  <div id="conferma-panel">
    <div id="conferma-header">
      <div id="conferma-titolo"></div>
    </div>
    <div id="conferma-body">
      <div id="conferma-testo"></div>
      <div class="vittoria-btn-row">
        <button id="btn-conferma-si" onclick="confermaSi()">✔ Sì</button>
        <button id="btn-conferma-no" onclick="confermaNo()">✕ Annulla</button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK (modular, versione CDN compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
